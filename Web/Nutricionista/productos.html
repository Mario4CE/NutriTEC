<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTEC - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">NutriTEC - Nutricionista</a>
            <div class="d-flex align-items-center">
                <span id="nombreUsuario" class="text-white me-3"></span>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <a href="dashboard.html" class="btn btn-link ps-0">&larr; Volver al panel</a>
        <h1 class="h3 mb-4">Agregar producto</h1>

        <div id="alertaMensaje" class="alert d-none" role="alert"></div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form id="formProducto">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Código de barras</label>
                            <input type="text" id="codigoBarras" class="form-control" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Porción (g/ml)</label>
                            <input type="number" step="0.1" id="porcionGramosMililitros" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Calorías (kcal)</label>
                            <input type="number" step="0.1" id="calorias" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Proteínas (g)</label>
                            <input type="number" step="0.1" id="proteinas" class="form-control" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Carbohidratos (g)</label>
                            <input type="number" step="0.1" id="carbohidratos" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Grasas (g)</label>
                            <input type="number" step="0.1" id="grasas" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Sodio (mg)</label>
                            <input type="number" step="0.1" id="sodioMiligramos" class="form-control" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Calcio (mg)</label>
                            <input type="number" step="0.1" id="calcioMiligramos" class="form-control">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Hierro (mg)</label>
                            <input type="number" step="0.1" id="hierroMiligramos" class="form-control">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Vitaminas</label>
                            <input type="text" id="vitaminas" class="form-control">
                        </div>
                    </div>

                    <p class="text-muted small">El producto quedará pendiente de aprobación por el administrador.</p>
                    <button type="submit" class="btn btn-success">Guardar producto</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/productos.js"></script>
</body>
</html>
