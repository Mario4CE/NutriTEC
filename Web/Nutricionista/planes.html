<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTEC - Planes Alimenticios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">NutriTEC - Nutricionista</a>
            <div class="d-flex align-items-center">
                <span id="nombreUsuario" class="text-white me-3"></span>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <a href="dashboard.html" class="btn btn-link ps-0">&larr; Volver al panel</a>
        <h1 class="h3 mb-4">Planes alimenticios</h1>

        <div id="alertaMensaje" class="alert d-none" role="alert"></div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h2 class="h6">Crear nuevo plan</h2>
                <form id="formPlan">
                    <div class="mb-3">
                        <label for="nombrePlan" class="form-label">Nombre del plan</label>
                        <input type="text" id="nombrePlan" class="form-control" required>
                    </div>

                    <div id="tiemposComida"></div>

                    <button type="button" id="btnAgregarItem" class="btn btn-outline-success btn-sm mb-3">
                        + Agregar producto al plan
                    </button>

                    <div class="text-end mb-3">
                        <strong>Total estimado: <span id="totalCaloriasEstimado">0</span> kcal</strong>
                    </div>

                    <button type="submit" class="btn btn-success">Guardar plan</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="h6">Mis planes</h2>
                <div id="listaPlanes">
                    <p class="text-muted">Cargando planes...</p>
                </div>
            </div>
        </div>
    </div>

    <template id="plantillaItemPlan">
        <div class="row g-2 align-items-end mb-2 item-plan">
            <div class="col-3">
                <label class="form-label small">Tiempo de comida</label>
                <select class="form-select form-select-sm campo-tiempo-comida" required>
                    <option value="1">Desayuno</option>
                    <option value="2">Merienda mañana</option>
                    <option value="3">Almuerzo</option>
                    <option value="4">Merienda tarde</option>
                    <option value="5">Cena</option>
                </select>
            </div>
            <div class="col-5">
                <label class="form-label small">Código de barras del producto</label>
                <input type="text" class="form-control form-control-sm campo-codigo-producto" placeholder="Código de barras" required>
            </div>
            <div class="col-2">
                <label class="form-label small">Porciones</label>
                <input type="number" step="0.1" min="0.1" class="form-control form-control-sm campo-porciones" value="1" required>
            </div>
            <div class="col-2">
                <button type="button" class="btn btn-outline-danger btn-sm w-100 btn-quitar-item">Quitar</button>
            </div>
        </div>
    </template>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/planes.js"></script>
</body>
</html>
