<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTEC - Panel de Nutricionista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">NutriTEC - Nutricionista</a>
            <div class="d-flex align-items-center">
                <span id="nombreUsuario" class="text-white me-3"></span>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h1 class="h3 mb-4">Bienvenido/a</h1>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center">
                        <h2 class="h5">Pacientes</h2>
                        <p class="text-muted">Busque clientes y gestione sus pacientes asociados.</p>
                        <a href="pacientes.html" class="btn btn-success">Ir a Pacientes</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center">
                        <h2 class="h5">Planes alimenticios</h2>
                        <p class="text-muted">Cree y administre planes con sus 5 tiempos de comida.</p>
                        <a href="planes.html" class="btn btn-success">Ir a Planes</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center">
                        <h2 class="h5">Productos</h2>
                        <p class="text-muted">Agregue nuevos productos o platillos al catálogo.</p>
                        <a href="productos.html" class="btn btn-success">Ir a Productos</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
