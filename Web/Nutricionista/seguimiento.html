<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTEC - Seguimiento del paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">NutriTEC - Nutricionista</a>
            <div class="d-flex align-items-center">
                <span id="nombreUsuario" class="text-white me-3"></span>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <a href="pacientes.html" class="btn btn-link ps-0">&larr; Volver a Pacientes</a>
        <h1 class="h3 mb-1">Seguimiento del paciente</h1>
        <p class="text-muted">Paciente: <span id="idPacienteMostrado"></span></p>

        <div id="alertaMensaje" class="alert d-none" role="alert"></div>

        <div class="row">
            <div class="col-md-7">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h2 class="h6">Registro diario de consumo</h2>
                        <div id="contenedorRegistroDiario">
                            <p class="text-muted small">Cargando registro diario...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="h6">Retroalimentación</h2>
                        <div id="hiloMensajes" class="mb-3" style="max-height: 350px; overflow-y: auto;">
                            <p class="text-muted">Cargando conversación...</p>
                        </div>

                        <form id="formMensaje">
                            <div class="mb-2">
                                <textarea id="textoMensaje" class="form-control" rows="3" placeholder="Escriba una retroalimentación para el paciente..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Enviar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/seguimiento.js"></script>
</body>
</html>
