<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTEC - Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">NutriTEC - Nutricionista</a>
            <div class="d-flex align-items-center">
                <span id="nombreUsuario" class="text-white me-3"></span>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <a href="dashboard.html" class="btn btn-link ps-0">&larr; Volver al panel</a>
        <h1 class="h3 mb-4">Pacientes</h1>

        <div id="alertaMensaje" class="alert d-none" role="alert"></div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h2 class="h6">Buscar clientes</h2>
                <form id="formBusqueda" class="row g-2">
                    <div class="col-9">
                        <input type="text" id="criterioBusqueda" class="form-control" placeholder="Nombre, apellidos o correo" required>
                    </div>
                    <div class="col-3">
                        <button type="submit" class="btn btn-success w-100">Buscar</button>
                    </div>
                </form>

                <div id="resultadosBusqueda" class="mt-3"></div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="h6">Mis pacientes</h2>
                <div id="listaPacientes" class="table-responsive">
                    <p class="text-muted">Cargando pacientes...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/pacientes.js"></script>
</body>
</html>
