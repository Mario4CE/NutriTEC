<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTEC - Registro de nutricionista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h4 mb-3 text-center">Registro de nutricionista</h1>

                        <div id="alertaError" class="alert alert-danger d-none" role="alert"></div>
                        <div id="alertaExito" class="alert alert-success d-none" role="alert"></div>

                        <form id="formRegistro">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="nombre" class="form-label">Nombre</label>
                                    <input type="text" class="form-control" id="nombre" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="apellidos" class="form-label">Apellidos</label>
                                    <input type="text" class="form-control" id="apellidos" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="cedula" class="form-label">Cédula</label>
                                    <input type="text" class="form-control" id="cedula" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="codigoNutricionista" class="form-label">Código de nutricionista</label>
                                    <input type="text" class="form-control" id="codigoNutricionista" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="edad" class="form-label">Edad</label>
                                    <input type="number" class="form-control" id="edad" min="18" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="fechaNacimiento" class="form-label">Fecha de nacimiento</label>
                                    <input type="date" class="form-control" id="fechaNacimiento" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="peso" class="form-label">Peso (kg)</label>
                                    <input type="number" step="0.1" class="form-control" id="peso" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="imc" class="form-label">IMC</label>
                                    <input type="number" step="0.1" class="form-control" id="imc" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="tipoCobro" class="form-label">Tipo de cobro</label>
                                    <select class="form-select" id="tipoCobro" required>
                                        <option value="" selected disabled>Seleccione...</option>
                                        <option value="Semanal">Semanal</option>
                                        <option value="Mensual">Mensual</option>
                                        <option value="Anual">Anual</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="direccion" class="form-label">Dirección</label>
                                <input type="text" class="form-control" id="direccion" required>
                            </div>

                            <div class="mb-3">
                                <label for="tarjetaCredito" class="form-label">Número de tarjeta de crédito</label>
                                <input type="text" class="form-control" id="tarjetaCredito" placeholder="0000000000000000" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="correo" class="form-label">Correo electrónico</label>
                                    <input type="email" class="form-control" id="correo" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="contrasena" class="form-label">Contraseña</label>
                                    <input type="password" class="form-control" id="contrasena" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success w-100">Registrarme</button>
                        </form>

                        <p class="text-center mt-3 mb-0">
                            ¿Ya tiene cuenta? <a href="login.html">Inicie sesión aquí</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/registro.js"></script>
</body>
</html>
